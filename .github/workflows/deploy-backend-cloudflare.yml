name: Deploy Backend to Cloudflare Workers

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-button]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
          cache-dependency-path: "./backend/package-lock.json"

      - name: Install dependencies
        run: npm ci
        
      - name: Check if deploy button trigger
        id: check-deploy-button
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" && "${{ github.event.action }}" == "deploy-button" ]]; then
            echo "is_deploy_button=true" >> $GITHUB_OUTPUT
          else
            echo "is_deploy_button=false" >> $GITHUB_OUTPUT
          fi

      - name: Create D1 Database
        if: steps.check-deploy-button.outputs.is_deploy_button == 'true'
        run: |
          echo "Creating D1 Database for deploy button deployment..."
          # 根据实际情况可能需要额外的步骤来创建数据库
          npx wrangler d1 create cloudpaste-db || echo "Database may already exist"
          
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Display Success Information
        if: steps.check-deploy-button.outputs.is_deploy_button == 'true' && success()
        run: |
          echo "===================================================="
          echo "🎉 CloudPaste 后端已成功部署到您的 Cloudflare Workers!"
          echo "===================================================="
          echo "下一步："
          echo "1. 请确保更新 wrangler.toml 中的 D1 数据库 ID"
          echo "2. 配置您的 R2 或其他 S3 兼容存储"
          echo "3. 部署前端应用"
          echo "===================================================="

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Backend deployment to Cloudflare Workers completed successfully!"
          else
            echo "❌ Backend deployment to Cloudflare Workers failed."
          fi
